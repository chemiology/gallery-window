<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>사진작가 홈페이지 | Artists | Gallery Window</title>

<meta name="description"
content="현대 사진작가들의 개인 홈페이지를 모아 소개합니다. 다양한 작가의 작품 세계를 확인할 수 있습니다.">

<meta name="robots" content="index,follow">

<link rel="canonical" href="https://gallerywindow.com/artists.html">

<link rel="icon" href="favicon.ico">
<meta name="theme-color" content="#111111">

<style>

/* ===== 기본 ===== */
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI",
              Roboto, "Noto Sans KR", sans-serif;

  background:#dfe4ea; /* 🔥 이전보다 더 깊은 톤 */
  color:#222;
  line-height:1.7;
}

/* ===== 배경 이미지 옵션 ===== */
body.bg-image{
  background-image:url('assets/images/bg.jpg');
  background-size:cover;
  background-position:center;
}

/* ===== 컨테이너 ===== */
.container{
  max-width:820px;
  margin:80px auto;
  padding:0 20px;
}

/* ===== 제목 ===== */
h1{
  font-size:22px;
  font-weight:500;
  margin-bottom:10px;
  letter-spacing:1px;
}

/* ===== 부제 ===== */
.subtitle{
  font-size:13px;
  color:#555;
  margin-bottom:30px;
}

/* ===== 설명 ===== */
.intro{
  font-size:14px;
  color:#555;
  margin-bottom:40px;
}

/* ===== 작가 리스트 ===== */
.artist{
  padding:18px 0;
  border-bottom:1px solid rgba(0,0,0,0.1);
}

/* 이름 */
.artist-name{
  font-size:16px;
  font-weight:500;
}

/* 링크 */
.artist a{
  display:inline-block;
  margin-top:8px;
  font-size:13px;
  color:#333;
  text-decoration:none;
  cursor:pointer; /* 🔥 손모양 */
}

.artist a:hover{
  color:#000;
  text-decoration:underline;
}

/* ===== 좌측 고정 버튼 ===== */
.home-btn{
  position:fixed;
  left:20px;
  top:50%;
  transform:translateY(-50%);

  background:rgba(0,0,0,0.6);
  color:#fff;

  padding:10px 16px;
  font-size:13px;

  border-radius:20px;
  text-decoration:none;

  transition:all .3s ease;
  cursor:pointer; /* 🔥 손모양 */
}

/* hover 효과 */
.home-btn:hover{
  background:#000;
  transform:translateY(-50%) scale(1.05);
}

/* ===== 모바일 전용 위치 ===== */
@media (max-width:768px){

  .home-btn{
    left:50%;
    bottom:16px;
    top:auto;

    transform:translateX(-50%);
    box-shadow:0 4px 20px rgba(0,0,0,0.25);

    font-size:12px;
    padding:10px 16px;

    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(6px);
  }

}


</style>

</head>

<body class="bg-image">

<!-- ===== 좌측 고정 버튼 ===== -->
<a href="index.html" class="home-btn">
대표화면 / Home
</a>

<div class="container">

<h1>사진작가 홈페이지</h1>
<div class="subtitle">Artists Homepage Directory</div>

<p class="intro">
Gallery Window에 참여한 현대 사진작가들의 개인 홈페이지를 소개합니다.<br>
Explore contemporary photographers and their portfolios.
</p>

<!-- ===== 작가 리스트 ===== -->

<div class="artist">
  <div class="artist-name">김경수 사진작가 (Kyoungsoo Kim)</div>
  <a href="https://www.kimkyoungsoo.com" target="_blank">
  김경수 사진작가 홈페이지 방문하기 / Visit Website
  </a>
</div>




</div>

</body>
</html>
