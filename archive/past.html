<script>

window.addEventListener("load", () => {

  function updateGridHeight(grid){
    grid.style.maxHeight = "none"; // 🔥 핵심 (초기화)
    grid.style.maxHeight = grid.scrollHeight + "px";
  }

  document.querySelectorAll(".year-divider").forEach(year => {

    const grid = year.nextElementSibling;
    if(!grid) return;

    const posters = grid.querySelectorAll(".poster-item");
    const count = posters.length;

    year.textContent = year.textContent + " (" + count + ")";

    year.addEventListener("click", () => {

      const isClosed = year.classList.toggle("closed");

      if(isClosed){
        grid.style.maxHeight = "0px";
        grid.style.overflow = "hidden";
      }else{
        updateGridHeight(grid); // 🔥 여기 변경
      }

    });

    grid.style.transition = "max-height 0.35s ease";

    // 🔥 초기 렌더 후 height 재계산
    const images = grid.querySelectorAll("img");

    let loadedCount = 0;

    function tryUpdate() {
      loadedCount++;
      if (loadedCount === images.length) {
        updateGridHeight(grid);
      }
    }

    images.forEach(img => {

      function onLoadHandler(){
        tryUpdate();
        img.classList.add("loaded");   // 🔥 추가
      }

      if (img.complete) {
        onLoadHandler();
      } else {
        img.addEventListener("load", onLoadHandler);
        img.addEventListener("error", tryUpdate);
      }

    });

  });

    const y = sessionStorage.getItem("scrollY");
    if (y) {
      window.scrollTo(0, parseInt(y));
    }

});

  window.addEventListener("beforeunload", () => {
    sessionStorage.setItem("scrollY", window.scrollY);
  });

</script>
