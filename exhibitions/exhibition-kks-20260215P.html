<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="index,follow">

<!-- ===== 전시 정보 (여기만 수정하면 됨) ===== -->
<script>
const EXHIBITION = {
  id: "kks-20260215",
  artist: "김경수",
  artistEN: "Kyoungsoo Kim",
  titleKR: "아바타 II",
  titleEN: "Avatar II",
  start: "2026-02-15",
  end: "2026-03-31",
  poster: "/exhibitions/images/kks-20260215.jpg"
};
</script>

<title id="page-title"></title>

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:title" id="og-title">
<meta property="og:description" id="og-desc">
<meta property="og:url" id="og-url">
<meta property="og:image" id="og-image">

<!-- SEO -->
<meta name="description" id="meta-desc">
<meta name="author" id="meta-author">
<meta name="keywords" id="meta-keywords">

<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/exhibition.css">
<link rel="stylesheet" href="/assets/css/exhibition-detail.css">

<!-- Structured Data -->
<script type="application/ld+json" id="structured-data"></script>

</head>

<body class="archive-detail-page">

<main>

<article class="exhibition-content">

<figure class="exhibition-poster">
<img id="poster-image" src="" alt="전시 포스터">
</figure>

<section class="exhibition-text" id="exhibition-info"></section>

<div id="note-profile"></div>

<div class="back-to-list">
  <a href="/archive/past.html">← 지난 전시 목록으로</a>
</div>

</article>

</main>

<script src="/assets/js/exhibition-detail.js"></script>

<script>

/* ===============================
   SEO 자동 생성
=============================== */

const ex = EXHIBITION;

const url = `https://gallerywindow.com/exhibitions/exhibition-${ex.id}.html`;

document.title =
`${ex.artist} · ${ex.titleKR} | Gallery Window`;

document.getElementById("meta-desc").content =
`${ex.titleEN}, a photography exhibition by ${ex.artistEN} at Gallery Window.`;

document.getElementById("meta-author").content =
ex.artistEN;

document.getElementById("meta-keywords").content =
`${ex.artistEN}, ${ex.titleEN}, photography exhibition, conceptual photography`;

document.getElementById("og-title").content =
`${ex.titleEN} — Gallery Window`;

document.getElementById("og-desc").content =
`${ex.artistEN} photography exhibition at Gallery Window`;

document.getElementById("og-url").content = url;

document.getElementById("og-image").content =
`https://gallerywindow.com${ex.poster}`;

document.getElementById("poster-image").src =
ex.poster;

/* ===============================
   Structured Data
=============================== */

const structured = {

"@context":"https://schema.org",

"@type":"ExhibitionEvent",

"name": ex.titleEN,

"startDate": ex.start,

"endDate": ex.end,

"location":{
"@type":"VirtualLocation",
"url":"https://gallerywindow.com"
},

"organizer":{
"@type":"Organization",
"name":"Gallery Window"
},

"creator":{
"@type":"Person",
"name":ex.artistEN
},

"image":`https://gallerywindow.com${ex.poster}`,

"workFeatured":{

"@type":"VisualArtwork",

"name":ex.titleEN,

"creator":{
"@type":"Person",
"name":ex.artistEN
},

"artform":"Photography",

"genre":"Conceptual Photography",

"image":`https://gallerywindow.com${ex.poster}`

}

};

document.getElementById("structured-data").textContent =
JSON.stringify(structured, null, 2);

</script>

</body>
</html>
