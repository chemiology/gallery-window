<!DOCTYPE html>
<html lang="ko">
<head>

<!-- ===== 기본 ===== -->
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="index,follow">

<title>Gallery Window | Mixed Exhibition</title>

<meta name="description"
      content="사진과 영상이 함께하는 온라인 전시를 감상하세요.">

<link rel="canonical" href="https://gallerywindow.com/mixed.html">

<!-- ===== Open Graph ===== -->
<meta property="og:type" content="website">
<meta property="og:title" content="Gallery Window | Mixed Exhibition">
<meta property="og:description" content="Image + Video Mixed Exhibition">
<meta property="og:image"
      content="https://gallerywindow.com/assets/og-gallery.jpg">

<!-- ===== CSS (기존 그대로 사용) -->
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/exhibition.css">
<link rel="stylesheet" href="assets/css/mixed.css">
<link rel="stylesheet" href="assets/css/mobile.css" media="(max-width:768px)">

</head>

<body class="exhibition mixed">

<div class="viewer">

  <!-- 이미지 레이어 -->
  <div class="image-wrapper layer-visible" id="image-layer">
    <div class="image-inner">
      <img id="mixed-image" src="" alt="exhibition image">
    </div>
    <div class="image-shield"></div>
    <div class="capture-guard"></div>
  </div>

  <!-- 🔥 영상 레이어 (최종) -->
<div class="video-wrapper layer-hidden" id="video-layer">

  <div class="video-frame">

    <iframe id="mixed-video"
      src=""
      frameborder="0"
      allow="autoplay; fullscreen; picture-in-picture"
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
      style="width:100%; height:100%; border:0;">
    </iframe>

    <!-- 🔥 보호 레이어 -->
    <div class="video-mask main"></div>

  </div>

  <!-- 🔥 사운드 버튼 -->
  <div id="sound-overlay" class="sound-overlay">
    🔊 클릭하여 사운드 시작
  </div>

</div>

</div>
  
  <!-- 🔥 완전히 독립 레이어 -->
  <div id="exhibition-caption"></div>
  <div id="artwork-counter"></div>

  <div id="slideshow-notice">
    화면을 터치하면 전시가 시작됩니다.<br>
    작품은 자동으로 전환됩니다.<br>
    영상은 끝나면 다음 작품으로 넘어갑니다.<br>
    <span class="notice-en">
    Images advance automatically. Videos proceed after playback.
    </span>
  </div>

<!-- 컨트롤 패널 (그대로 유지) -->
<div class="control-panel">
  <div class="control-toggle">⚙</div>
  <div class="control-box" style="display:none;">
    <label>
      Viewing Mode<br>
      <input type="radio" name="mode" value="auto" checked> Auto
      <input type="radio" name="mode" value="manual"> Manual
    </label>

    <label>
      Slide Speed
      <input type="range" id="speed" min="3" max="20" value="10">
    </label>

    <label>
      Volume
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
    </label>

    <button id="mute">Mute</button>
  </div>
</div>

<p class="audio-hint">
  화면을 클릭하면 사운드가 활성화됩니다.<br>
  <span class="notice-en">
  Tap to start the exhibition.
  </span>
</p>

<div class="caption" id="caption"></div>

<a id="backHome" class="back-home-exhibition">
  ← Hall
</a>

<div class="site-background"></div>
<div class="page-fade" id="pageFade"></div>

<script src="https://player.vimeo.com/api/player.js"></script>
<!-- 🔥 mixed 전용 JS -->
<script src="assets/js/mixed.js"></script>

<div id="cinema-fade"></div>

</body>
</html>
