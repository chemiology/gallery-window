<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Gallery Window – Exhibition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Exhibition 전용 CSS -->
  <link rel="stylesheet" href="assets/css/exhibition.css">
</head>

<body>

  <!-- 이미지 뷰어 -->
  <div class="viewer">
    <img id="exhibition-image" src="" alt="">
  </div>

  <!-- 컨트롤 패널 -->
  <div class="control-panel">
    <div class="control-toggle">⚙</div>
    <div class="control-box" style="display:none;">
      <label>
        Viewing Mode<br>
        <input type="radio" name="mode" value="auto" checked> Auto
        <input type="radio" name="mode" value="manual"> Manual
      </label>

      <label>
        Slide Speed
        <input type="range" id="speed" min="3" max="20" value="10">
      </label>

      <label>
        Volume
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
      </label>

      <button id="mute">Mute</button>
    </div>
  </div>

<p class="audio-hint">
  설정에서 음향을 켜세요.
</p>

  <!-- 방명록 (전시화면용, 하나만) -->
  <section class="exhibition-guestbook">
    <span class="guestbook-label">방명록</span>

    <ul id="guestbook-list"></ul>

    <form id="guestbook-form">
      <input
        type="text"
        id="guestbook-input"
        placeholder="이 전시에 대한 한 줄 감상"
        maxlength="80"
        required
      >
      <button type="submit">남기기</button>
    </form>
  </section>

  <!-- 캡션 -->
  <div class="caption" id="caption"></div>

<!-- Back to Home (Exhibition Hall) -->
<a href="index.html" class="back-home-exhibition">
  ← Home
</a>

  <!-- JS -->
<script src="assets/js/guestbook-config.js"></script>
<script src="assets/js/exhibition.js"></script>

<script>
  const GUESTBOOK_URL = window.GUESTBOOK_URL;

const EXHIBITION_ID = 'avatar2_2026';
const HALL_ID = 'hall1';     // 2관이면 'hall2'
const PAGE_ID = 'viewer';

const form = document.getElementById('guestbook-form');
const input = document.getElementById('guestbook-input');

form.addEventListener('submit', function (e) {
  e.preventDefault();

  const message = input.value.trim();
  if (!message) return;

  fetch(GUESTBOOK_URL, {
    method: 'POST',
    body: JSON.stringify({
      exhibition_id: EXHIBITION_ID,
      hall_id: HALL_ID,
      message: message,
      page: PAGE_ID
    })
  })
  .then(res => res.text())
  .then(txt => {
    if (txt === 'OK') {
      input.value = '';
      // 화면에 바로 반영 (선택)
      const li = document.createElement('li');
      li.textContent = message;
      document.getElementById('guestbook-list').prepend(li);
    } else {
      alert('방명록 저장 중 오류가 발생했습니다.');
    }
  })
  .catch(() => {
    alert('네트워크 오류가 발생했습니다.');
  });
});
</script>

</body>
</html>
