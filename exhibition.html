<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery Window</title>

  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="exhibition">

<!-- 전시 제목 / 작가 (잠깐 노출) -->
<div class="meta"></div>

<!-- 슬라이드 이미지 -->
<div class="slide-container">
  <img id="slide-image" src="" alt="Exhibition image" draggable="false" />
</div>

<!-- 워터마크 -->
<div class="watermark">Gallery Window</div>

<!-- 관람자 컨트롤 -->
<div class="control-icon">⚙</div>

<div class="control-panel">
  <div class="panel-inner">

    <div class="control-group">
      <p class="label">Viewing Mode</p>
      <label>
        <input type="radio" name="mode" value="auto" checked /> Auto
      </label>
      <label>
        <input type="radio" name="mode" value="manual" /> Manual
      </label>
    </div>

    <div class="control-group">
      <p class="label">Slide Speed</p>
      <input type="range" id="slide-speed" min="5" max="20" step="1" />
    </div>

    <div class="control-group">
      <p class="label">Volume</p>
      <input type="range" id="volume" min="0" max="1" step="0.01" />
    </div>

    <div class="control-group">
      <button id="mute">Mute</button>
    </div>

  </div>
</div>

<script src="assets/js/exhibition.js"></script>
</body>
</html>
