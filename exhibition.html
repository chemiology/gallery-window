<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Gallery Window – Exhibition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Exhibition 전용 CSS -->
  <link rel="stylesheet" href="assets/css/exhibition.css">
</head>

<body>

  <!-- 이미지 뷰어 -->
  <div class="viewer">
    <img id="exhibition-image" src="" alt="">
  </div>

  <!-- 컨트롤 패널 -->
  <div class="control-panel">
    <div class="control-toggle">⚙</div>
    <div class="control-box" style="display:none;">
      <label>
        Viewing Mode<br>
        <input type="radio" name="mode" value="auto" checked> Auto
        <input type="radio" name="mode" value="manual"> Manual
      </label>

      <label>
        Slide Speed
        <input type="range" id="speed" min="3" max="20" value="10">
      </label>

      <label>
        Volume
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
      </label>

      <button id="mute">Mute</button>
    </div>
  </div>

<p class="audio-hint">
  설정에서 음향을 켜세요.
</p>

  <!-- 방명록 (전시화면용, 하나만) -->
<!-- ===== 1관 방명록 ===== -->
<section class="exhibition-guestbook">
  <h3 class="guestbook-title">방명록</h3>

  <ul id="guestbook-list"></ul>

  <form id="guestbook-form">

    <input type="hidden" id="exhibition_id_field" name="exhibition_id">
    <input type="hidden" id="hall_id_field" name="hall_id">

    <input
      type="text"
      id="guestbook-input"
      placeholder="이 전시에 대한 한 줄 감상"
      maxlength="80"
      required
    >

    <button type="submit">남기기</button>
  </form>
</section>

<script src="assets/js/exhibition.js"></script>
<script src="assets/js/guestbook-config.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const exhibitionId =
    new URLSearchParams(window.location.search).get("id");

  const form = document.getElementById("guestbook-form");
  const input = document.getElementById("guestbook-input");
  const exhibitionField = document.getElementById("exhibition_id_field");
  const hallField = document.getElementById("hall_id_field");

  // 🔴 hall 자동 판별 (1관 / 2관)
  const hallId = document.body.dataset.hall || "hall1";

  if (exhibitionField) exhibitionField.value = exhibitionId;
  if (hallField) hallField.value = hallId;

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    const message = input.value.trim();
    if (!message) return;

    fetch(window.GUESTBOOK_URL + "?" + new URLSearchParams({
      exhibition_id: exhibitionId,
      hall_id: hallId,
      message: message,
      page: "viewer"
    }))
    .then(res => res.text())
    .then(() => {
      input.value = "";
    });

    .then(res => res.text())
    .then(() => {
      input.value = "";
    });
  });

});
</script>

</body>
</html>
