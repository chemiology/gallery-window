<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>갤러리 창 | Gallery Window</title>

  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="home">

<header class="site-header">
  <h1>
    <span class="ko">갤러리 창</span>
    <span class="en">Gallery Window</span>
  </h1>
  <p class="subtitle">A window for contemporary photography</p>

  <!-- 대표 공지사항 (있을 때만 표시) -->
  <div id="headline-notice"></div>
</header>

<main class="main">
  <section class="exhibitions">
    <!--
      index.js가 여기 안에
      전시 1관 / 2관 블록을 자동으로 생성합니다.
    -->
  </section>
</main>

<section class="home-notice">
  <iframe
    src="notice-board.html"
    class="notice-frame"
    scrolling="no">
  </iframe>
</section>

<!-- 방명록만 전시 하단 영역으로 유지 -->
<section class="bottom-area">
  <section class="guestbook">
    <h3>최근 방명록</h3>
    <div id="guestbook-area"></div>
  </section>
</section>

<footer class="site-footer">
  <div class="footer-inner">
    <span class="footer-title">Gallery Window © 2026</span>
  </div>
</footer>

<!-- JS는 항상 맨 마지막 -->
<script src="assets/js/index.js"></script>

</html>
